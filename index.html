<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Martha's Rule Call Triage and Patient Review Log</title>
</head>
<body>
  <main id="app">
    <section class="shell">
      <article class="card">
        <div class="card-body">
          <h1>Martha's Rule Call Triage and Patient Review Log</h1>
          <p class="muted">Loading workflow...</p>
        </div>
      </article>
    </section>
  </main>
  <script>
    (function loadFreshAssets() {
      const token = Date.now().toString();
      const css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "styles.css?v=" + encodeURIComponent(token);
      document.head.appendChild(css);

      const js = document.createElement("script");
      js.defer = true;
      js.src = "app.js?v=" + encodeURIComponent(token);
      document.body.appendChild(js);
    }());
  </script>
</body>
</html>
